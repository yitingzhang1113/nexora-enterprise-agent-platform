# Milvus 向量库栈: etcd + minio + milvus(standalone)
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: nexora
spec:
  selector: { app: etcd }
  ports: [{ port: 2379, targetPort: 2379 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: nexora
spec:
  serviceName: etcd
  replicas: 1
  selector: { matchLabels: { app: etcd } }
  template:
    metadata: { labels: { app: etcd } }
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.16
          command: ["etcd", "-advertise-client-urls=http://etcd:2379", "-listen-client-urls=http://0.0.0.0:2379", "--data-dir=/etcd"]
          env:
            - { name: ETCD_AUTO_COMPACTION_MODE, value: revision }
            - { name: ETCD_AUTO_COMPACTION_RETENTION, value: "1000" }
            - { name: ETCD_QUOTA_BACKEND_BYTES, value: "4294967296" }
          ports: [{ containerPort: 2379 }]
          volumeMounts: [{ name: etcd, mountPath: /etcd }]
  volumeClaimTemplates:
    - metadata: { name: etcd }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: nexora
spec:
  selector: { app: minio }
  ports: [{ port: 9000, targetPort: 9000 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: nexora
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-09-22T00-33-43Z
          command: ["minio", "server", "/minio_data"]
          env:
            - { name: MINIO_ROOT_USER, value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin }
          ports: [{ containerPort: 9000 }]
          volumeMounts: [{ name: minio, mountPath: /minio_data }]
  volumeClaimTemplates:
    - metadata: { name: minio }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 5Gi } } }
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: nexora
spec:
  selector: { app: milvus }
  ports:
    - { name: grpc, port: 19530, targetPort: 19530 }
    - { name: metrics, port: 9091, targetPort: 9091 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milvus
  namespace: nexora
spec:
  serviceName: milvus
  replicas: 1
  selector: { matchLabels: { app: milvus } }
  template:
    metadata: { labels: { app: milvus } }
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.5.4
          args: ["milvus", "run", "standalone"]
          env:
            - { name: ETCD_ENDPOINTS, value: "etcd:2379" }
            - { name: MINIO_ADDRESS, value: "minio:9000" }
          ports:
            - { containerPort: 19530 }
            - { containerPort: 9091 }
          readinessProbe:
            httpGet: { path: /healthz, port: 9091 }
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts: [{ name: milvus, mountPath: /var/lib/milvus }]
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "2Gi" }
  volumeClaimTemplates:
    - metadata: { name: milvus }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 10Gi } } }
