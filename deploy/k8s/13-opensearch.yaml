# 有状态: OpenSearch (向量+关键词混合检索) StatefulSet + PVC
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: nexora
spec:
  selector:
    app: opensearch
  ports:
    - port: 9200
      targetPort: 9200
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: nexora
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.17.1
          env:
            - name: discovery.type
              value: single-node
            - name: plugins.security.disabled
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              value: "Nexora_2026!"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: osdata
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { cpu: "1", memory: "1536Mi" }
  volumeClaimTemplates:
    - metadata:
        name: osdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
