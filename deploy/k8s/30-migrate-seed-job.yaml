# 一次性 Job: 建 langfuse 库 + Alembic 迁移 + 写入通用种子数据
# 学习点: 用 Job 做「一次性运维动作」, 与长期运行的 Deployment 分离。
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-seed
  namespace: nexora
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate-seed
          image: nexora/backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "ensuring langfuse db..."
              python - <<'PY'
              import psycopg
              from app.config import settings
              base = settings.database_url.replace("+psycopg", "")
              with psycopg.connect(base, autocommit=True) as c:
                  exists = c.execute("SELECT 1 FROM pg_database WHERE datname='langfuse'").fetchone()
                  if not exists:
                      c.execute("CREATE DATABASE langfuse")
                      print("created langfuse db")
              PY
              echo "running migrations..."
              alembic upgrade head
              echo "seeding general data..."
              python -m app.seed.seed
          envFrom:
            - configMapRef: { name: nexora-config }
            - secretRef: { name: nexora-secret }
