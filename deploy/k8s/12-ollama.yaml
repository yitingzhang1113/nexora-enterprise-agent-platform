# 有状态: Ollama (模型缓存卷较大) 用 StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: nexora
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: nexora
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits: { cpu: "4", memory: "8Gi" }
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
