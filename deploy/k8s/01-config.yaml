# 非敏感配置 (ConfigMap) + 敏感配置 (Secret)
# 学习点: K8s 中「配置与镜像解耦」—— 同一镜像在不同环境注入不同配置。
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora
data:
  REDIS_URL: "redis://redis:6379/0"
  OLLAMA_BASE_URL: "http://ollama:11434"
  GEN_MODEL: "llama3.1"
  EMBED_MODEL: "bge-m3"
  EMBED_DIM: "1024"
  LLM_PROVIDER: "ollama"
  TOP_K: "5"
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "150"
  UPLOAD_DIR: "/app/uploads"
  CORS_ORIGINS: "http://localhost:3000,http://nexora.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secret
  namespace: nexora
type: Opaque
stringData:
  POSTGRES_USER: "nexora"
  POSTGRES_PASSWORD: "nexora"
  POSTGRES_DB: "nexora"
  DATABASE_URL: "postgresql+psycopg://nexora:nexora@postgres:5432/nexora"
  ANTHROPIC_API_KEY: ""
