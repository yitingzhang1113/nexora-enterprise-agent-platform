# 非敏感配置 (ConfigMap) + 敏感配置 (Secret) —— v2
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora
data:
  REDIS_URL: "redis://redis:6379/0"
  OPENSEARCH_URL: "http://opensearch:9200"
  OPENSEARCH_INDEX: "nexora_chunks"
  MODEL_SERVER_URL: "http://model-server:9000"
  OLLAMA_BASE_URL: "http://ollama:11434"
  EMBED_MODEL: "bge-m3"
  EMBED_DIM: "1024"
  LLM_MODEL: "ollama/qwen2.5:3b"
  TOP_K: "5"
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "150"
  UPLOAD_DIR: "/app/uploads"
  CORS_ORIGINS: "http://localhost:3000,http://nexora.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secret
  namespace: nexora
type: Opaque
stringData:
  POSTGRES_USER: "nexora"
  POSTGRES_PASSWORD: "nexora"
  POSTGRES_DB: "nexora"
  DATABASE_URL: "postgresql+psycopg://nexora:nexora@postgres:5432/nexora"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
