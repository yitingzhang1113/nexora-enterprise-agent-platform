apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-seed
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate-seed
          image: {{ .Values.image.backend }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              alembic upgrade head
              python -m seed.seed
          envFrom:
            - configMapRef: { name: nexora-config }
            - secretRef: { name: nexora-secret }
