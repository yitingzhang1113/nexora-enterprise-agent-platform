image:
  backend: nexora/backend:latest
  frontend: nexora/frontend:latest
  pullPolicy: IfNotPresent

replicas:
  backend: 1
  worker: 1
  frontend: 1

# 应用配置 (注入 ConfigMap) —— v3
config:
  REDIS_URL: "redis://redis:6379/0"
  MILVUS_URI: "http://milvus:19530"
  MILVUS_COLLECTION: "nexora_chunks"
  MODEL_SERVER_URL: "http://model-server:9000"
  OLLAMA_BASE_URL: "http://ollama:11434"
  EMBED_MODEL: "bge-m3"
  EMBED_DIM: "1024"
  LLM_PROVIDER: "ollama"
  LLM_MODEL_MAIN: "qwen2.5:3b"
  LLM_MODEL_FAST: "qwen2.5:3b"
  TOP_K: "5"
  RERANK_MODE: "llm"
  LANGFUSE_HOST: "http://langfuse:3000"
  LANGFUSE_PUBLIC_KEY: "pk-lf-nexora"
  LANGFUSE_SECRET_KEY: "sk-lf-nexora"
  UPLOAD_DIR: "/app/uploads"
  CORS_ORIGINS: "http://nexora.local"

# 敏感配置 (注入 Secret)
secret:
  DATABASE_URL: "postgresql+psycopg://nexora:nexora@postgres:5432/nexora"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""

ingress:
  enabled: true
  className: nginx
  frontendHost: nexora.local
  backendHost: api.nexora.local

resources:
  backend:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  frontend:
    requests: { cpu: "50m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
