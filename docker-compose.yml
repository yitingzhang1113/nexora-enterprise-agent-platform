# 本地开发一键起 (v3): postgres + redis + milvus(etcd+minio) + langfuse + ollama + model_server + backend + worker + frontend
# 用法:
#   cp .env.example .env
#   docker compose up -d
#   docker compose run --rm backend python -m app.seed.seed
# 注意: Milvus + Langfuse + Ollama 较吃内存, 建议 Docker 分配 >= 10GB。
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexora}
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexora}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---- Milvus 依赖: etcd + minio ----
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    volumes:
      - minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 20
    depends_on:
      - etcd
      - minio

  # ---- Langfuse (可观测) ----
  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-nexora}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: nexora-nextauth-secret
      SALT: nexora-salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: nexora
      LANGFUSE_INIT_PROJECT_ID: nexora
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-nexora
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-nexora
      LANGFUSE_INIT_USER_EMAIL: admin@nexora.local
      LANGFUSE_INIT_USER_PASSWORD: nexora123
      LANGFUSE_INIT_USER_NAME: Admin
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 3 &&
       ollama pull ${GEN_OLLAMA_MODEL:-qwen2.5:3b} &&
       ollama pull ${EMBED_MODEL:-bge-m3} &&
       echo 'models pulled'"
    restart: "no"

  model_server:
    build: ./backend
    command: ["uvicorn", "model_server.main:app", "--host", "0.0.0.0", "--port", "9000"]
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "9000:9000"
    depends_on:
      ollama:
        condition: service_started

  backend:
    build: ./backend
    command: ["bash", "entrypoint.sh"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-nexora}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus:19530
      MODEL_SERVER_URL: http://model_server:9000
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: pk-lf-nexora
      LANGFUSE_SECRET_KEY: sk-lf-nexora
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
      model_server:
        condition: service_started

  worker:
    build: ./backend
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-nexora}@postgres:5432/${POSTGRES_DB:-nexora}
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus:19530
      MODEL_SERVER_URL: http://model_server:9000
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
      NEXT_PUBLIC_LANGFUSE_URL: ${NEXT_PUBLIC_LANGFUSE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  etcd:
  minio:
  milvus:
  ollama:
  uploads:
